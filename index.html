<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  
  <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>

  <style>
    /* --- FONTS --- */
    @font-face {
      font-family: 'TitleFont';
      src: url('fonts/TITLE_FONT.ttf') format('truetype');
    }
    @font-face {
      font-family: 'ButtonFont';
      src: url('fonts/BUTTON_FONT.ttf') format('truetype');
    }
    
    /* --- CORE SETUP --- */
    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto !important; }
    .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
    .lenis.lenis-stopped { overflow: hidden; }
    .lenis.lenis-scrolling iframe { pointer-events: none; }

    body {
      margin: 0;
      background: #020c15;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      color: white;
    }

    /* --- NAVIGATION --- */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0; width: 100%;
      padding: 30px 50px;
      box-sizing: border-box;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
      pointer-events: none;
    }

    .nav-side { pointer-events: auto; z-index: 1001; }

    .nav-home {
      color: white; text-decoration: none;
      font-size: 16px; font-weight: 500;
      opacity: 0.8; transition: opacity 0.3s;
    }
    .nav-home:hover { opacity: 1; }

    .nav-hire-btn {
      background: #89e900; padding: 10px 20px;
      border-radius: 8px; color: black; font-weight: 700;
      border: none; cursor: pointer;
      font-family: 'ButtonFont', sans-serif;
      transition: transform 0.2s;
    }
    .nav-hire-btn:hover { transform: scale(1.05); }

    /* --- CENTER CAPSULE --- */
    .nav-capsule {
      pointer-events: auto;
      position: absolute; left: 50%;
      /* transform handled by animation */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(137, 233, 0, 0.12) 100%);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5), inset 0 0 20px rgba(137, 233, 0, 0.05);
      padding: 12px 40px; gap: 30px; border-radius: 50px;
      display: flex; justify-content: center; align-items: center;
      opacity: 0; 
      animation: slideInRight 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideInRight {
      0% { opacity: 0; transform: translateX(-30%); }
      100% { opacity: 1; transform: translateX(-50%); }
    }

    .nav-capsule a {
      color: rgba(255, 255, 255, 0.8); text-decoration: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: 0.3s ease;
    }
    .nav-capsule a:hover {
      color: #89e900; text-shadow: 0 0 10px rgba(137, 233, 0, 0.5);
    }

    /* --- HEADER --- */
    header {
      width: 100%; padding-top: 140px; text-align: center;
      position: relative; min-height: 90vh;
      overflow: hidden; perspective: 1200px;
    }

    .title {
      font-size: 125px; font-weight: 700; line-height: 0.98;
      font-family: 'TitleFont', sans-serif; user-select: none;
      opacity: 0; animation: fadeUp 1.2s ease-out forwards; 
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .subtext {
      margin-top: 1px; font-size: 13px;
      opacity: 0; animation: fadeUp 1.2s ease-out 0.5s forwards; 
    }

    .btn-row {
      margin-top: 18px; display: flex; justify-content: center; gap: 20px;
      opacity: 0; animation: scalePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.9s forwards;
    }

    button {
      background: #89e900; padding: 10px 18px;
      border: none; border-radius: 10px;
      font-size: 17px; font-weight: 800; cursor: pointer;
      font-family: 'ButtonFont', sans-serif;
    }

    /* --- PORTFOLIO (EMPTY) --- */
    .portfolio-section {
      text-align: center; padding: 70px 0;
      color: white; min-height: 200px; 
    }
    
    /* --- 3D FLOATING CARDS --- */
    .header-content { position: relative; z-index: 5; transform-style: preserve-3d; }
    .float-card {
      position: absolute; border-radius: 20px; overflow: hidden;
      box-shadow: 0 30px 60px -10px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      transform-style: preserve-3d; transition: transform 0.3s ease;
      width: 270px; height: 480px;
      opacity: 0; animation: popIn 1s ease-out 1.3s both; 
    }
    .float-card video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .back-layer { z-index: 1; filter: brightness(0.9); }
    .front-layer { z-index: 10; }
    .pos-left {
      top: 50%; left: 6%; 
      transform: translateY(-50%) rotateY(25deg) rotateX(5deg) rotateZ(-3deg);
    }
    .pos-right-top {
      top: 50%; right: 6%; 
      transform: translateY(-50%) rotateY(-25deg) rotateX(5deg) rotateZ(3deg);
    }

    @media (max-width: 1200px) {
      .float-card { display: none; }
      header { min-height: auto; perspective: none; }
      nav { padding: 20px; }
      .nav-capsule { display: none; }
    }
    @keyframes scalePop {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes popIn {
      from { opacity: 0; margin-top: 60px; }
      to { opacity: 1; margin-top: 0; }
    }

    /* --- FOOTER --- */
    .footer-section {
      padding: 220px 0 60px; text-align: center; color: white;
      background-image: url('hourglass.jpg');
      background-repeat: no-repeat; background-size: 1000px;
      background-position: center bottom; position: relative;
    }
    .footer-title {
      font-size: 100px; font-weight: 800; margin-bottom: 20px;
      font-family: 'TitleFont', sans-serif;
    }
    .footer-sub { font-size: 16px; opacity: 0.7; margin-bottom: 25px; }
    .footer-btn {
      background-color: #89e900; border: none; padding: 12px 10px;
      border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 220px;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 40px;
      font-size: 14px; opacity: 0.7; flex-wrap: wrap;
    }
    .footer-links a { color: white; text-decoration: none; }
    .footer-links span { opacity: 0.7; }

    /* --- OVERLAY & PANEL --- */
    #inquiry-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      display: none; z-index: 2000;
    }
    #inquiry-panel {
      position: fixed; top: 0; right: 0;
      width: 420px; height: 100vh;
      background: #0b0f18; padding: 30px;
      box-shadow: none; 
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 2500;
      transform: translateX(100%);
      transition: transform 0.45s ease, box-shadow 0.45s ease;
      box-sizing: border-box; 
    }
    #inquiry-panel.active {
      transform: translateX(0);
      box-shadow: -8px 0 30px rgba(0,0,0,0.5);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; }
    .panel-header h2 { margin: 0; font-size: 28px; font-family: 'TitleFont', sans-serif; }
    #close-panel { font-size: 24px; cursor: pointer; opacity: 0.6; }
    #close-panel:hover { opacity: 1; }

    .panel-form { margin-top: 20px; display: flex; flex-direction: column; gap: 14px; }
    .panel-form input, .panel-form textarea {
      width: 100%; padding: 12px; border-radius: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: white; font-size: 15px; box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    .panel-form textarea { height: 120px; resize: none; }
    .panel-form button {
      margin-top: 10px; background: #89e900; border: none;
      padding: 12px; border-radius: 10px; font-weight: 700;
      font-family: 'ButtonFont', sans-serif; cursor: pointer;
      transition: opacity 0.3s;
    }
    .panel-form button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Result text styling */
    #form-result {
        font-size: 14px; margin-top: 10px; text-align: center; opacity: 0.8;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-side left">
    <a href="#" class="nav-home">Home</a>
  </div>

  <div class="nav-capsule">
    <a href="#">Portfolio</a>
    <a href="#">Testimonials</a>
    <a href="#">About Me</a>
    <a href="#">Why Me?</a>
  </div>

  <div class="nav-side right">
    <button class="nav-hire-btn hire-btn-trigger">Hire Me</button>
  </div>
</nav>

<header>
  <div class="header-content">
    <h1 class="title">Telling Stories<br>Through<br>Visuals</h1>
    <p class="subtext">100% of Clients are Happy - 0 Deadlines Missed</p>

    <div class="btn-row">
      <button class="hire-btn-trigger">HIRE ME</button>
      <button onclick="document.getElementById('portfolio-section').scrollIntoView({behavior: 'smooth'})">WATCH SHOWREEL</button>
    </div>
  </div>

  <div class="float-card pos-right-top back-layer">
    <video src="videos/work2.mp4" autoplay loop muted playsinline></video>
  </div>
  <div class="float-card pos-left front-layer">
    <video src="videos/work1.mp4" autoplay loop muted playsinline></video>
  </div>
</header>

<section class="portfolio-section" id="portfolio-section">
  </section>

<footer class="footer-section">
  <div class="footer-content">
    <p class="footer-title">Let's Work Together</p>
    <p class="footer-sub">Looking forward to hearing from you.</p>
    <button class="footer-btn hire-btn-trigger">HIRE ME →</button>
    <div class="footer-links">
      <a href="#">PRIVACY POLICY</a>
      <a href="#">X / TWITTER →</a>
      <a href="#">EMAIL →</a>
      <span>© 2025 NEXORA. ALL RIGHTS RESERVED</span>
    </div>
  </div>
</footer>

<div id="inquiry-overlay"></div>
<div id="inquiry-panel">
  <div class="panel-header">
    <h2>Work Inquiry</h2>
    <span id="close-panel">✕</span>
  </div>
  
  <form class="panel-form" id="contact-form">
    <input type="hidden" name="access_key" value="79ec6880-fc5e-4b55-9c40-ae5cb4548a3c">

    <label>Name</label>
    <input type="text" name="name" placeholder="Your name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="you@example.com" required>

    <label>Project Details</label>
    <textarea name="message" placeholder="Tell me about your project..." required></textarea>

    <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

    <button type="submit" id="submit-btn">Send Inquiry</button>
    <div id="form-result"></div>
  </form>
</div>

<script>
// 1. INQUIRY PANEL
const inquiryPanel = document.getElementById('inquiry-panel');
const overlay = document.getElementById('inquiry-overlay');
const closePanel = document.getElementById('close-panel');
const openButtons = document.querySelectorAll('.hire-btn-trigger, .btn-row button:first-child, .footer-btn');

openButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    inquiryPanel.classList.add('active');
    overlay.style.display = 'block';
  });
});
closePanel.addEventListener('click', () => {
  inquiryPanel.classList.remove('active');
  overlay.style.display = 'none';
});
overlay.addEventListener('click', () => {
  inquiryPanel.classList.remove('active');
  overlay.style.display = 'none';
});

// 2. SMOOTH SCROLL (LENIS)
const lenis = new Lenis({
  duration: 1.5,
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
  direction: 'vertical',
  gestureDirection: 'vertical',
  smooth: true,
  mouseMultiplier: 1,
  smoothTouch: false,
  touchMultiplier: 2,
});

function raf(time) {
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    e.preventDefault();
    lenis.scrollTo(this.getAttribute('href'));
  });
});

// 3. FORM SUBMISSION LOGIC
const form = document.getElementById('contact-form');
const result = document.getElementById('form-result');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(form);
    const object = Object.fromEntries(formData);
    const json = JSON.stringify(object);
    
    // Change Button Text
    submitBtn.innerHTML = "Sending...";
    submitBtn.disabled = true;
    result.innerHTML = "";

    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: json
    })
    .then(async (response) => {
        let json = await response.json();
        if (response.status == 200) {
            result.innerHTML = "Sent Successfully!";
            result.style.color = "#89e900"; // Green success text
            
            // Clear form
            form.reset();
            
            // Restore button
            submitBtn.innerHTML = "Send Inquiry";
            submitBtn.disabled = false;

            // Close panel after 2 seconds
            setTimeout(() => {
                inquiryPanel.classList.remove('active');
                overlay.style.display = 'none';
                result.innerHTML = ""; // Clear message for next time
            }, 2000);
        } else {
            console.log(response);
            result.innerHTML = json.message;
            result.style.color = "red";
            submitBtn.innerHTML = "Send Inquiry";
            submitBtn.disabled = false;
        }
    })
    .catch(error => {
        console.log(error);
        result.innerHTML = "Something went wrong!";
        result.style.color = "red";
        submitBtn.innerHTML = "Send Inquiry";
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>
